<mat-toolbar color="primary">
  <span>Users</span>
  <span class="spacer"></span>
  <a mat-button routerLink="/dashboard">Dashboard</a>
  <button mat-raised-button color="accent" (click)="openCreateDialog()">Add user</button>
</mat-toolbar>

<div class="users-content">
  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  @if (loading()) {
    <mat-spinner></mat-spinner>
  } @else {
    <table mat-table [dataSource]="users()" class="users-table">
      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef>Username</th>
        <td mat-cell *matCellDef="let user">{{ user.username }}</td>
      </ng-container>

      <ng-container matColumnDef="displayName">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let user">{{ user.displayName }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Role</th>
        <td mat-cell *matCellDef="let user">
          <mat-form-field subscriptSizing="dynamic">
            <mat-select
              [value]="user.role"
              [disabled]="isSelf(user)"
              (selectionChange)="updateRole(user, $event.value)"
              [attr.aria-label]="'Role for ' + user.username"
            >
              @for (role of roles; track role) {
                <mat-option [value]="role">{{ role }}</mat-option>
              }
            </mat-select>
          </mat-form-field>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let user">
          <mat-form-field subscriptSizing="dynamic">
            <mat-select
              [value]="user.status"
              [disabled]="isSelf(user)"
              (selectionChange)="updateStatus(user, $event.value)"
              [attr.aria-label]="'Status for ' + user.username"
            >
              @for (status of statuses; track status) {
                <mat-option [value]="status">{{ status }}</mat-option>
              }
            </mat-select>
          </mat-form-field>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>
  }
</div>
