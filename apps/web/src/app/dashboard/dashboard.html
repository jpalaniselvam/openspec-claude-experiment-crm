<mat-toolbar color="primary">
  <span>CRM</span>
  <span class="spacer"></span>
  @if (user()) {
    <span class="user-info">{{ user()!.displayName }} ({{ user()!.organizationSlug }})</span>
  }
  @if (isAdmin()) {
    <a mat-button routerLink="/admin/users">Users</a>
  }
  <button mat-button (click)="logout()">Log out</button>
</mat-toolbar>

<div class="dashboard-content">
  <p>You are signed in.</p>
</div>
